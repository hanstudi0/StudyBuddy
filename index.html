<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Buddy.ai - SSC 10th Tutor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: #000010; color: #f8fafc; margin: 0; overflow-x: hidden; }

        /* ── Starfield ── */
        .stars-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(59,130,246,0.05) 0%, transparent 50%),
                #000010;
        }
        .stars-bg::before {
            content: ''; position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 25% 45%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,255,255,.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 70%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 85% 55%, rgba(255,255,255,.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 92% 10%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 62% 50%, rgba(255,255,255,.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 85%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 5% 35%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(2px 2px at 48% 25%, rgba(200,200,255,.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 72%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 95% 40%, rgba(255,255,255,.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 18% 95%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 5%,  rgba(255,255,255,.8) 0%, transparent 100%);
        }
        .stars-bg::after {
            content: ''; position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 8%  62%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 38%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 65% 15%, rgba(180,180,255,.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 82% 48%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 22% 28%, rgba(255,255,255,.6) 0%, transparent 100%),
                radial-gradient(2px 2px at 90% 90%, rgba(255,255,255,.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 52% 88%, rgba(255,255,255,.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 3%  50%, rgba(255,255,255,.6) 0%, transparent 100%);
            animation: twinkle 4s ease-in-out infinite alternate;
        }
        @keyframes twinkle { 0% { opacity:.6 } 100% { opacity:1 } }

        /* ── Planet ── */
        .planet {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #a78bfa, #4f46e5 50%, #1e1b4b 80%);
            box-shadow: 0 0 40px rgba(99,102,241,.5), 0 0 80px rgba(99,102,241,.2), inset -10px -10px 20px rgba(0,0,0,.5);
            position: relative; animation: float 6s ease-in-out infinite;
        }
        .planet::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%) rotateX(75deg);
            width: 150px; height: 150px; border-radius: 50%;
            border: 3px solid rgba(139,92,246,.4); border-top-color: rgba(139,92,246,.1);
            box-shadow: 0 0 15px rgba(139,92,246,.3);
        }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

        /* ── Shooting stars ── */
        .shooting-star {
            position: fixed; top: 10%; left: -10%;
            width: 150px; height: 1px;
            background: linear-gradient(90deg, transparent, white, transparent);
            animation: shoot 8s linear infinite; opacity: 0;
        }
        .shooting-star:nth-child(2){ top:30%; animation-delay:3s; animation-duration:6s; }
        .shooting-star:nth-child(3){ top:60%; animation-delay:6s; }
        @keyframes shoot {
            0%   { left:-10%; opacity:0 }
            5%   { opacity:1 }
            40%  { opacity:0 }
            100% { left:110%; opacity:0 }
        }

        /* ── Glass card ── */
        .glass-card {
            background: rgba(15,12,41,.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139,92,246,.2);
            box-shadow: 0 0 40px rgba(99,102,241,.1), inset 0 1px 0 rgba(255,255,255,.05);
        }

        /* ── Scrollbar ── */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(139,92,246,.3); border-radius: 10px; }

        /* ── Spinner ── */
        .spinner { width:20px; height:20px; border:2px solid rgba(139,92,246,.2); border-top-color:#8b5cf6; border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to{ transform:rotate(360deg) } }

        /* ── Prose ── */
        .prose p   { margin-bottom:12px; line-height:1.6; }
        .prose strong { color:#a78bfa; }
        .prose ul, .prose ol { margin-left:1.2rem; margin-bottom:12px; }
        .prose code { background:rgba(139,92,246,.15); padding:2px 6px; border-radius:4px; font-size:.85em; color:#c4b5fd; }

        /* ── Glow button ── */
        .btn-glow {
            background: linear-gradient(135deg,#4f46e5,#7c3aed);
            box-shadow: 0 0 20px rgba(99,102,241,.4), 0 0 40px rgba(99,102,241,.1);
            transition: all .3s ease;
        }
        .btn-glow:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(99,102,241,.6), 0 0 60px rgba(99,102,241,.2);
            transform: translateY(-1px);
        }
        .btn-glow:disabled { background:rgba(30,27,75,.5); box-shadow:none; color:rgba(255,255,255,.2); }

        .subject-btn { transition:all .2s ease; }
        .subject-btn:hover { transform:translateY(-1px); }

        .input-glow:focus-within { border-color:rgba(139,92,246,.5); box-shadow:0 0 15px rgba(99,102,241,.15); }

        .bot-bubble { background:rgba(30,20,60,.8); border:1px solid rgba(139,92,246,.2); box-shadow:0 0 15px rgba(99,102,241,.05); }

        .header-space {
            background:rgba(5,3,20,.85);
            backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(139,92,246,.15);
            box-shadow:0 0 30px rgba(99,102,241,.08);
        }

        .gradient-text {
            background:linear-gradient(135deg,#a78bfa,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }

        #root { position:relative; z-index:1; }

        /* ── Notification pop ── */
        @keyframes notif-pop { 0%{transform:scale(.8);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
        .notif-pop { animation: notif-pop .25s ease forwards; }
    </style>
</head>
<body>
    <div class="stars-bg"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div class="shooting-star"></div>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        /* ── Config ── */
        const API_KEY  = "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";
        const API_URL  = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL    = "llama-3.3-70b-versatile";

        /* ── Soft notification sound via Web Audio API (no external files needed) ── */
        function playNotifSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = "sine";
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.12, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.35);
            } catch(e) { /* silence if blocked */ }
        }

        /* ── Syllabus ── */
        const SYLLABUS = {
            "English":   ["1: Where the Mind is Without Fear","2: The Thief's Story","3: On Wings of Courage","4: All the World's a Stage","5: Joan of Arc","6: The Alchemy of Nature","7: Animals","8: Three Questions","9: Connecting the Dots","10: The Pulley","11: Let's March","12: Science and Spirituality","13: Night of the Scorpion","14: The Night I Met Einstein","15: Stephen Hawking","16: The Will to Win","17: Unbeatable Super Mom – Mary Kom","18: The Concert","19: A Thing of Beauty is a Joy Forever","20: The Luncheon"],
            "Algebra":   ["1: Linear Equations in Two Variables","2: Quadratic Equations","3: Arithmetic Progression","4: Financial Planning","5: Probability","6: Statistics"],
            "Geometry":  ["1: Similarity","2: Pythagoras Theorem","3: Circle","4: Geometric Constructions","5: Coordinate Geometry","6: Trigonometry","7: Mensuration"],
            "Science 1": ["1: Gravitation","2: Periodic Classification of Elements","3: Chemical Reactions and Equations","4: Effects of Electric Current","5: Heat","6: Refraction of Light","7: Lenses","8: Metallurgy","9: Carbon Compounds","10: Space Missions"],
            "Science 2": ["1: Heredity and Evolution","2: Life Processes in Living Organisms – Part 1","3: Life Processes in Living Organisms – Part 2","4: Environmental Management","5: Towards Green Energy","6: Animal Classification","7: Introduction to Microbiology","8: Cell Biology and Biotechnology","9: Social Health","10: Disaster Management"],
            "History":   ["1: Historiography – Development in the West","2: Historiography – Indian Tradition","3: Applied History","4: History of Indian Arts","5: Mass Media and History","6: Entertainment and History","7: Sports and History","8: Tourism and History","9: Heritage Management"],
            "Civics":    ["1: Working of the Constitution","2: The Electoral Process","3: Political Parties","4: Social and Political Movements","5: Challenges before Indian Democracy"],
            "Geography": ["1: Field Visit","2: Location and Extent","3: Physiography and Drainage","4: Climate","5: Natural Vegetation and Wildlife","6: Population","7: Human Settlements","8: Economy and Occupations","9: Tourism, Transport and Communication"]
        };

        const ICONS = { "English":"📖","Algebra":"🪐","Geometry":"🔭","Science 1":"⚗️","Science 2":"🧬","History":"🌌","Civics":"🛸","Geography":"🌍" };

        /* ── System prompt ── */
        const systemPrompt = (subject, chapter) =>
`You are Buddy — a warm, friendly AI tutor for SSC Grade 10 students (Maharashtra Board).

IDENTITY:
- Your name is Buddy.
- You were created by Ateeb, a talented 14-year-old developer who loves building apps and games.
- ONLY mention Ateeb when the user explicitly asks something like "Who made you?", "Who is your creator?", or "Who owns you?". Never bring it up otherwise.

TEACHING STYLE:
- Be conversational, encouraging, and patient.
- For Math / Science problems give: Given → To Find → Formula → Step-by-step Solution → Final Answer.
- Use markdown for clarity (bold, lists, code blocks).
- Keep language simple and easy to understand.

Current session: Subject = ${subject} | Chapter = ${chapter}.`;

        /* ════════════════════════════════════════════
                            APP
           ════════════════════════════════════════════ */
        function App() {
            const [page,            setPage]            = useState('setup');
            const [selectedSubject, setSelectedSubject] = useState("");
            const [selectedChapter, setSelectedChapter] = useState("");
            const [messages,        setMessages]        = useState([]);
            const [input,           setInput]           = useState("");
            const [isTyping,        setIsTyping]        = useState(false);
            const [error,           setError]           = useState(null);
            const [newMsgId,        setNewMsgId]        = useState(null);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages, isTyping]);

            const handleStart = () => {
                setPage('chat');
                const id = 'init';
                setMessages([{
                    id,
                    role: 'bot',
                    text: `Hello, Explorer! I'm **Buddy** — your AI study companion. 🚀\n\nMission loaded: **${selectedSubject}** › *${selectedChapter}*\n\nWhat would you like to explore today?`
                }]);
            };

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = { id: Date.now().toString(), role:'user', text: input.trim() };
                setMessages(prev => [...prev, userMsg]);
                setInput("");
                setIsTyping(true);
                setError(null);

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type':  'application/json',
                            'Authorization': `Bearer ${API_KEY}`
                        },
                        body: JSON.stringify({
                            model: MODEL,
                            max_tokens: 1024,
                            messages: [
                                { role:'system', content: systemPrompt(selectedSubject, selectedChapter) },
                                ...messages.map(m => ({ role: m.role === 'bot' ? 'assistant' : 'user', content: m.text })),
                                { role:'user', content: userMsg.text }
                            ]
                        })
                    });

                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);

                    const botText = data.choices?.[0]?.message?.content || "Sorry, I couldn't process that.";
                    const botId   = Date.now().toString();
                    setMessages(prev => [...prev, { id: botId, role:'bot', text: botText }]);
                    setNewMsgId(botId);
                    playNotifSound();           // 🔔 soft notification
                    setTimeout(() => setNewMsgId(null), 600);
                } catch(err) {
                    setError("⚠️ " + err.message);
                } finally {
                    setIsTyping(false);
                }
            };

            /* ── SETUP PAGE ── */
            if (page === 'setup') return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="w-full max-w-md glass-card rounded-[2.5rem] p-8 shadow-2xl">

                        {/* Logo */}
                        <div className="flex flex-col items-center mb-8">
                            <div className="planet mb-5"></div>
                            <h1 className="text-3xl font-black text-center">
                                <span className="gradient-text">Study Buddy</span>
                                <span className="text-violet-500">.ai</span>
                            </h1>
                            <p className="text-[10px] text-slate-500 mt-1 tracking-widest uppercase">SSC Grade 10 · Maharashtra Board</p>
                        </div>

                        <div className="space-y-6">
                            {/* Subject */}
                            <div>
                                <label className="text-[10px] font-bold text-violet-400 uppercase tracking-widest block mb-3">✦ Select Subject</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {Object.keys(SYLLABUS).map(sub => (
                                        <button key={sub}
                                            onClick={() => { setSelectedSubject(sub); setSelectedChapter(""); }}
                                            className={`subject-btn p-2.5 rounded-xl text-[10px] font-bold border transition-all flex items-center gap-1.5
                                                ${selectedSubject === sub
                                                    ? 'bg-violet-600/30 border-violet-500/60 text-violet-200 shadow-lg shadow-violet-900/30'
                                                    : 'bg-white/3 border-white/5 text-slate-400 hover:border-violet-500/30 hover:text-slate-300'}`}>
                                            <span>{ICONS[sub]}</span>{sub}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Chapter */}
                            <div>
                                <label className="text-[10px] font-bold text-violet-400 uppercase tracking-widest block mb-3">✦ Choose Chapter</label>
                                <div className="max-h-[180px] overflow-y-auto space-y-1 custom-scrollbar pr-2">
                                    {selectedSubject
                                        ? SYLLABUS[selectedSubject].map(ch => (
                                            <button key={ch} onClick={() => setSelectedChapter(ch)}
                                                className={`w-full p-2.5 rounded-xl text-left text-[10px] border transition-all
                                                    ${selectedChapter === ch
                                                        ? 'bg-violet-500/20 border-violet-500/50 text-violet-200'
                                                        : 'bg-white/3 border-transparent text-slate-500 hover:text-slate-300 hover:bg-white/5'}`}>
                                                {ch}
                                            </button>
                                        ))
                                        : <div className="flex flex-col items-center py-6 text-slate-600">
                                            <span className="text-3xl mb-2">🌌</span>
                                            <p className="text-[10px] italic">Select a subject to begin your mission</p>
                                          </div>
                                    }
                                </div>
                            </div>

                            <button disabled={!selectedSubject || !selectedChapter} onClick={handleStart}
                                className="btn-glow w-full py-4 rounded-2xl font-bold text-sm text-white tracking-wide">
                                🚀 Launch Session
                            </button>
                        </div>
                    </div>

                    {/* ── Subtle Ateeb credit ── */}
                    <p className="mt-6 text-[10px] text-slate-700 tracking-wide">
                        crafted with ♡ by <span className="text-violet-700 font-semibold">Ateeb</span>
                    </p>
                </div>
            );

            /* ── CHAT PAGE ── */
            return (
                <div className="flex flex-col h-screen">
                    {/* Header */}
                    <header className="header-space px-4 py-3 flex items-center justify-between">
                        <button onClick={() => setPage('setup')}
                            className="w-9 h-9 flex items-center justify-center rounded-xl bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:border-violet-500/40 transition-all">
                            ←
                        </button>
                        <div className="text-center">
                            <h2 className="text-xs font-bold gradient-text">{ICONS[selectedSubject]} {selectedSubject}</h2>
                            <p className="text-[9px] text-violet-400/70 font-semibold truncate max-w-[160px]">{selectedChapter}</p>
                        </div>
                        <div className="w-9 h-9 rounded-xl border border-violet-500/30 bg-violet-600/10 flex items-center justify-center"
                            style={{boxShadow:'0 0 10px rgba(139,92,246,.2)'}}>
                            <span className="text-[10px] font-black text-violet-400">AI</span>
                        </div>
                    </header>

                    {/* Messages */}
                    <main className="flex-1 overflow-y-auto p-4 custom-scbar">
                        <div className="max-w-2xl mx-auto space-y-4">
                            {messages.map(msg => (
                                <div key={msg.id}
                                    className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} ${msg.id === newMsgId ? 'notif-pop' : ''}`}>
                                    {msg.role === 'bot' && (
                                        <div className="w-7 h-7 rounded-full bg-violet-600/20 border border-violet-500/30 flex items-center justify-center mr-2 mt-1 flex-shrink-0 text-[10px]">
                                            🤖
                                        </div>
                                    )}
                                    <div className={`p-4 rounded-2xl max-w-[88%] text-sm prose
                                        ${msg.role === 'user'
                                            ? 'btn-glow text-white rounded-br-sm'
                                            : 'bot-bubble text-slate-300 rounded-bl-sm'}`}>
                                        <div dangerouslySetInnerHTML={{ __html: marked.parse(msg.text) }} />
                                    </div>
                                </div>
                            ))}

                            {isTyping && (
                                <div className="flex items-center gap-3 ml-9">
                                    <div className="spinner"></div>
                                    <span className="text-[10px] text-violet-400/60 animate-pulse">Buddy is thinking…</span>
                                </div>
                            )}
                            <div ref={chatEndRef} />
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="header-space px-4 py-3">
                        <div className="max-w-2xl mx-auto">
                            {error && (
                                <div className="mb-2 text-[9px] text-red-400 text-center bg-red-500/10 p-2 rounded-xl border border-red-500/20">
                                    {error}
                                </div>
                            )}
                            <div className="input-glow flex gap-2 bg-white/3 p-2 rounded-2xl border border-white/10 transition-all">
                                <input
                                    value={input}
                                    onChange={e => setInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && handleSend()}
                                    className="flex-1 bg-transparent outline-none text-sm px-3 text-white placeholder-slate-600"
                                    placeholder="Ask Buddy anything…" />
                                <button onClick={handleSend} disabled={!input.trim() || isTyping}
                                    className="btn-glow px-5 py-2 rounded-xl text-xs font-bold text-white whitespace-nowrap">
                                    Send 🚀
                                </button>
                            </div>
                            {/* Ateeb subtle footer credit */}
                            <p className="text-center text-[9px] text-slate-800 mt-2 tracking-wide">
                                made by <span className="text-violet-900 font-semibold">Ateeb</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
